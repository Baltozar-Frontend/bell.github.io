<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIG Exchange v2.0 | Свино-Терминал</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #181a20;
            --primary: #f1c40f;
            --up: #02c076;
            --down: #f84960;
            --text: #eaeaea;
            --text-dim: #848e9c;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'BinancePlex', 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            padding: 20px;
        }

        .terminal-container { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid #2b2f36; 
            width: 100%; 
            max-width: 480px; 
            box-shadow: 0 16px 40px rgba(0,0,0,0.6); 
        }

        /* Шапка с монеткой */
        .coin-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .coin-img { 
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid var(--primary); 
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }
        .coin-title h2 { margin: 0; font-size: 1.2rem; }
        .coin-title span { font-size: 0.8rem; color: var(--text-dim); }

        /* Цена */
        .price-section { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #2b2f36; padding-bottom: 20px; }
        .market-price { font-size: 42px; font-weight: 800; margin: 5px 0; transition: color 0.3s; }
        .price-change { font-size: 0.9rem; font-weight: bold; }

        /* Статистика */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #2b2f36; padding: 12px; border-radius: 10px; }
        .stat-card span { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .stat-card strong { font-size: 1.1rem; color: var(--primary); }

        /* Кнопки действий */
        .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        
        button { 
            border: none; padding: 12px; font-size: 14px; font-weight: bold; 
            border-radius: 6px; cursor: pointer; transition: 0.2s; 
        }
        
        .btn-buy { background: var(--up); color: white; }
        .btn-buy:hover { filter: brightness(1.1); }
        .btn-sell { background: var(--down); color: white; }
        .btn-sell:hover { filter: brightness(1.1); }
        
        .btn-max { 
            background: #474d57; color: white; font-size: 10px; padding: 4px; 
            border-radius: 4px; opacity: 0.8;
        }
        .btn-max:hover { opacity: 1; }
        
        button:disabled { background: #2b2f36; color: #5e6673; cursor: not-allowed; }

        /* График */
        #chart-container { margin-top: 20px; height: 180px; position: relative; }
        
        .history-log {
            margin-top: 20px; background: rgba(0,0,0,0.2); 
            border-radius: 8px; padding: 10px; height: 80px; overflow-y: auto; font-size: 12px;
        }
        .log-entry { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px solid #2b2f36; padding-bottom: 2px; }

        .back-link { margin-top: 20px; color: var(--text-dim); text-decoration: none; font-size: 13px; transition: 0.3s; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="coin-header">
            <img src="img.webp" alt="PIG" class="coin-img">
            <div class="coin-title">
                <h2>PIG / CLICKS</h2>
                <span>Spot Trading (Piggy Bank)</span>
            </div>
        </div>

        <div class="price-section">
            <div id="market-price" class="market-price">5000</div>
            <div id="price-change" class="price-change">0.00% (24h)</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <span>Доступно Кликов</span>
                <strong id="user-clicks">0</strong>
            </div>
            <div class="stat-card">
                <span>Баланс PIG</span>
                <strong id="user-coins">0</strong>
            </div>
        </div>

        <div class="trade-grid">
            <div class="btn-group">
                <button class="btn-buy" onclick="buyCoin(1)">КУПИТЬ 1</button>
                <button class="btn-max" onclick="buyMax()">КУПИТЬ MAX</button>
            </div>
            <div class="btn-group">
                <button class="btn-sell" onclick="sellCoin(1)">ПРОДАТЬ 1</button>
                <button class="btn-max" onclick="sellMax()">ПРОДАТЬ MAX</button>
            </div>
        </div>

        <div id="chart-container">
            <canvas id="liveChart"></canvas>
        </div>

        <div class="history-log" id="trade-log">
            <div style="color: #5e6673; text-align: center;">История сделок пуста</div>
        </div>
    </div>

    <a href="index.html" class="back-link">← Вернуться к кликеру</a>

    <script>
        // Данные
        let clicks = parseInt(localStorage.getItem('clicks')) || 0;
        let coins = parseInt(localStorage.getItem('pigCoins')) || 0;
        let startPrice = 5000;
        
        const priceEl = document.getElementById('market-price');
        const changeEl = document.getElementById('price-change');
        const clicksEl = document.getElementById('user-clicks');
        const coinsEl = document.getElementById('user-coins');
        const logEl = document.getElementById('trade-log');

        function updateUI() {
            clicksEl.innerText = clicks.toLocaleString();
            coinsEl.innerText = coins.toLocaleString();
            localStorage.setItem('clicks', clicks);
            localStorage.setItem('pigCoins', coins);
        }
        updateUI();

        // Настройка Chart.js
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [{
                    data: Array(30).fill(5000),
                    borderColor: '#f1c40f',
                    borderWidth: 2,
                    backgroundColor: 'rgba(241, 196, 15, 0.05)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        position: 'right',
                        grid: { color: '#2b2f36' }, 
                        ticks: { color: '#848e9c', font: { size: 10 } } 
                    }
                },
                animation: { duration: 400 }
            }
        });

        // Движок курса
        let trend = 0; // Настроение рынка
        setInterval(() => {
            const currentData = liveChart.data.datasets[0].data;
            let lastPrice = currentData[currentData.length - 1];
            
            // Имитация тренда
            trend += (Math.random() - 0.5) * 0.5;
            trend = Math.max(-2, Math.min(2, trend));

            let volatility = Math.floor(Math.random() * 301) - 150; 
            let newPrice = Math.floor(lastPrice + volatility + (trend * 50));

            // Лимиты
            if (newPrice < 1000) newPrice = 1500;
            if (newPrice > 25000) newPrice = 20000;

            // Обновление графика
            currentData.push(newPrice);
            currentData.shift();
            
            // Цвет графика
            const color = newPrice >= lastPrice ? "#02c076" : "#f84960";
            liveChart.data.datasets[0].borderColor = color;
            liveChart.update();

            // Текст цены
            priceEl.innerText = newPrice;
            priceEl.style.color = color;

            // Расчет % изменения
            let diff = (((newPrice - startPrice) / startPrice) * 100).toFixed(2);
            changeEl.innerText = `${diff > 0 ? '+' : ''}${diff}%`;
            changeEl.style.color = diff >= 0 ? "#02c076" : "#f84960";
        }, 1000);

        function addLog(type, amount, price) {
            if (logEl.innerHTML.includes("История сделок пуста")) logEl.innerHTML = "";
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span style="color: ${type === 'BUY' ? '#02c076' : '#f84960'}">${type} ${amount} PIG</span>
                <span style="color: var(--text-dim)">@ ${price}</span>
                <span style="font-size: 9px; color: #444">${time}</span>
            `;
            logEl.prepend(entry);
        }

        // Торговля
        function buyCoin(qty) {
            const price = parseInt(priceEl.innerText);
            if (clicks >= price * qty) {
                clicks -= price * qty;
                coins += qty;
                addLog('BUY', qty, price);
                updateUI();
            } else {
                priceEl.style.animation = "shake 0.2s"; // Можно добавить CSS тряску
            }
        }

        function buyMax() {
            const price = parseInt(priceEl.innerText);
            let qty = Math.floor(clicks / price);
            if (qty > 0) buyCoin(qty);
        }

        function sellCoin(qty) {
            const price = parseInt(priceEl.innerText);
            if (coins >= qty) {
                coins -= qty;
                clicks += price * qty;
                addLog('SELL', qty, price);
                updateUI();
            }
        }

        function sellMax() {
            if (coins > 0) sellCoin(coins);
        }
    </script>
</body>
</html>

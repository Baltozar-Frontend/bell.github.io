<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Свино-Биржа | PIG Exchange</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .exchange-card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .coin-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f1c40f; margin-bottom: 10px; }
        .market-price { font-size: 32px; color: #00ff00; margin: 10px 0; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; background: #222; padding: 15px; border-radius: 12px; }
        .stat-item span { display: block; font-size: 12px; color: #888; text-transform: uppercase; }
        .stat-item strong { font-size: 18px; color: #f1c40f; }
        
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn-buy { background: #27ae60; color: white; }
        .btn-buy:hover { background: #2ecc71; transform: translateY(-2px); }
        .btn-sell { background: #e74c3c; color: white; }
        .btn-sell:hover { background: #ff4757; transform: translateY(-2px); }
        button:disabled { background: #444; opacity: 0.5; cursor: not-allowed; }
        
        canvas { margin-top: 20px; }
        .back-link { margin-top: 20px; color: #555; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="exchange-card">
        <img src="img.webp" alt="PIG" class="coin-img">
        <div style="color: #888;">Текущий курс PIG:</div>
        <div id="market-price" class="market-price">5000</div>

        <div class="stats-grid">
            <div class="stat-item">
                <span>Ваши Клики</span>
                <strong id="user-clicks">0</strong>
            </div>
            <div class="stat-item">
                <span>Ваши Свино-коины</span>
                <strong id="user-coins">0</strong>
            </div>
        </div>

        <div class="actions">
            <button class="btn-buy" onclick="buyCoin()">КУПИТЬ (1)</button>
            <button class="btn-sell" onclick="sellCoin()">ПРОДАТЬ (1)</button>
        </div>

        <canvas id="liveChart"></canvas>
    </div>

    <a href="index.html" class="back-link">← Вернуться к кликеру</a>

    <script>
        // Загрузка данных
        let clicks = parseInt(localStorage.getItem('clicks')) || 0;
        let coins = parseInt(localStorage.getItem('pigCoins')) || 0;
        
        const priceEl = document.getElementById('market-price');
        const clicksEl = document.getElementById('user-clicks');
        const coinsEl = document.getElementById('user-coins');

        function updateUI() {
            clicksEl.innerText = clicks;
            coinsEl.innerText = coins;
            localStorage.setItem('clicks', clicks);
            localStorage.setItem('pigCoins', coins);
        }
        updateUI();

        // Настройка Chart.js
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    data: Array(20).fill(5000),
                    borderColor: '#f1c40f',
                    backgroundColor: 'rgba(241, 196, 15, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#222' }, ticks: { color: '#555' } }
                }
            }
        });

        // Работа биржи (Курс скачет)
        setInterval(() => {
            const currentData = liveChart.data.datasets[0].data;
            let lastPrice = currentData[currentData.length - 1];
            
            // Случайное изменение курса (волатильность)
            let change = Math.floor(Math.random() * 401) - 200; // от -200 до +200
            let newPrice = lastPrice + change;

            // Ограничители курса
            if (newPrice < 2500) newPrice = 3000;
            if (newPrice > 8000) newPrice = 7500;

            currentData.push(newPrice);
            currentData.shift();
            liveChart.update();

            priceEl.innerText = newPrice;
            // Цвет цены: красный если упал, зеленый если вырос
            priceEl.style.color = newPrice >= lastPrice ? "#00ff00" : "#ff4757";
        }, 1500);

        function buyCoin() {
            const currentPrice = parseInt(priceEl.innerText);
            if (clicks >= currentPrice) {
                clicks -= currentPrice;
                coins += 1;
                updateUI();
            } else {
                alert("Не хватает кликов!");
            }
        }

        function sellCoin() {
            const currentPrice = parseInt(priceEl.innerText);
            if (coins > 0) {
                coins -= 1;
                clicks += currentPrice;
                updateUI();
            } else {
                alert("У вас нет Свино-коинов для продажи!");
            }
        }
    </script>
</body>
</html>
